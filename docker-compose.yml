version: '3.9'

services:
  # ─────────────────────────────────────────
  # MongoDB (Secured with Authentication)
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: barber-mongo
    restart: unless-stopped
    environment:
      # 🔐 Root admin credentials (change in production!)
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-barber_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: barber-saas
      # Passed to init script for app user creation
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required}
    # 🔒 Port NOT exposed to host — only accessible within Docker network
    # Uncomment the next 2 lines ONLY for local development debugging:
    # ports:
    #   - '127.0.0.1:27017:27017'
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ 'CMD', 'mongosh', '--eval', "db.adminCommand('ping').ok", '--quiet' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────
  # Backend (Node.js / Express)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: barber-backend
    restart: unless-stopped
    env_file:
      - ./.env
      - ./backend/.env # ← carga último → sobreescribe MONGO_URI con Atlas
    environment:
      NODE_ENV: production
      PORT: 4000
      # ✅ These override backend/.env (dev values) — critical for production
      CORS_ORIGIN: ${CORS_ORIGIN:-https://barbersaas.duckdns.org}
      FRONTEND_URL: ${FRONTEND_URL:-https://barbersaas.duckdns.org}
      PRODUCTION_DOMAINS: ${PRODUCTION_DOMAINS:-https://barbersaas.duckdns.org}
      MONGO_URI: ${MONGO_URI}
    depends_on:
      mongo:
        condition: service_healthy
    # 🔒 Port NOT exposed to host — backend is only accessible through Nginx (internal Docker network)
    # Uncomment ONLY for local debugging:
    # ports:
    #   - '127.0.0.1:4000:4000'
    volumes:
      - backend-logs:/app/logs
      - backend-backups:/app/backups

  # ─────────────────────────────────────────
  # Frontend (Vite build → Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./barberapp-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
    container_name: barber-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo-data:
  backend-logs:
  backend-backups:
