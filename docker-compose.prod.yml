# ─────────────────────────────────────────────────────────────
# Docker Compose — Production Override (SSL/TLS)
# ─────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Before first run:
#   1. Set DOMAIN and CERTBOT_EMAIL in your .env file
#   2. Run: bash scripts/init-letsencrypt.sh
# ─────────────────────────────────────────────────────────────

services:
  frontend:
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN is required}
    # On startup, substitute ${DOMAIN} in the SSL config and use it
    command: >
      /bin/sh -c "
        if [ -f /etc/letsencrypt/live/${DOMAIN}/fullchain.pem ]; then
          echo '🔒 SSL certificates found — enabling HTTPS';
          envsubst '$$DOMAIN' < /etc/nginx/conf.d/ssl.conf.template > /etc/nginx/conf.d/default.conf;
          # 🔄 Periodically reload nginx to pick up renewed certificates
          (while true; do sleep 24h; nginx -s reload; done) &
        else
          echo '⚠️  No SSL certificates found — running HTTP only';
          echo '   Run scripts/init-letsencrypt.sh first';
        fi;
        nginx -g 'daemon off;'
      "

  # ─────────────────────────────────────────
  # Certbot (Let's Encrypt auto-renewal)
  # ─────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: barber-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Auto-renew every 12 hours (certbot exits if not needed)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    depends_on:
      - frontend

  # ─────────────────────────────────────────
  # MongoDB Automated Backups (Daily at 3 AM)
  # ─────────────────────────────────────────
  backup:
    image: mongo:7
    container_name: barber-backup
    restart: unless-stopped
    volumes:
      - ./scripts/backup-mongo.sh:/backup-mongo.sh:ro
      - mongo-backups:/backups
    environment:
      # ✅ FIXED: Now backs up Atlas (real data) instead of the empty local container
      # MONGO_URI takes priority over host/port/user/password in backup-mongo.sh
      MONGO_URI: ${MONGO_URI:?MONGO_URI is required for Atlas backup}
      MONGO_DB: barber_saas
      BACKUP_DIR: /backups
      RETENTION_DAILY: 7
      RETENTION_WEEKLY: 4
      RETENTION_MONTHLY: 6
    # Run backup at 3 AM daily using a simple sleep loop
    entrypoint: >
      /bin/bash -c "
        echo '🗃️  Backup service started (Atlas mode)';
        echo '   Schedule: Daily at 03:00 UTC';
        echo '   Retention: 7 daily / 4 weekly / 6 monthly';
        chmod +x /backup-mongo.sh;
        # Run initial backup on startup
        /backup-mongo.sh;
        # Then run daily at 3 AM
        while true; do
          CURRENT_HOUR=$$(date +%H);
          CURRENT_MIN=$$(date +%M);
          if [ \"$$CURRENT_HOUR\" = '03' ] && [ \"$$CURRENT_MIN\" = '00' ]; then
            /backup-mongo.sh;
            sleep 120;
          fi;
          sleep 50;
        done
      "
    # Note: no depends_on mongo — we connect to Atlas, not the local container

volumes:
  certbot-conf:
  certbot-www:
  mongo-backups:
